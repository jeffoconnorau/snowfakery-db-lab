# sap_complete.recipe.yml

# --- 1. PRODUCT MASTER (MARA) ---
- object: MARA
  count: 200
  fields:
    MATNR: ${{unique_id}}            # Material Number
    MTART: ${{random_choice("FERT", "HALB", "ROH")}} # Material Type
    MBRSH: "M"                       # Industry Sector
    MEINS: "PC"                      # Base Unit of Measure
    MAKTX: ${{fake.Word}} Product Group # Description

# --- 2. CUSTOMER MASTER (KNA1) ---
- object: KNA1
  count: 10000 
  fields:
    KUNNR: ${{unique_id}}            # Customer Number
    NAME1: ${{fake.Company}}         # Name
    ORT01: ${{fake.City}}            # City
    PSTLZ: ${{fake.Postalcode}}      # Postal Code
    LAND1: ${{fake.CountryCode}}     # Country Key
    TELF1: ${{fake.PhoneNumber}}     # Telephone
    ERDAT: ${{date_between(start_date='-5y', end_date='today')}} # Created On

# --- 3. SALES ORDER HEADER (VBAK) & FINANCIALS ---
  friends:
    - object: VBAK
      nickname: SalesOrder
      count: ${{random_number(min=1, max=5)}} 
      fields:
        VBELN: ${{unique_id}}        # Sales Document
        ERDAT: ${{date_between(start_date='-1y', end_date='today')}}
        AUART: "OR"                  # Standard Order
        NETWR: ${{random_number(min=100, max=5000)}} # Net Value
        WAERK: "USD"                 # Currency
        VKORG: "1000"                # Sales Org

      friends:
        # --- 3a. SALES ORDER ITEMS (VBAP) ---
        - object: VBAP
          count: ${{random_number(min=1, max=5)}}
          fields:
            VBELN: ${{SalesOrder.VBELN}} # Link to Header
            POSNR: ${{unique_id}}    # Item Number
            MATNR: ${{random_number(min=1, max=200)}} # Simple link to Material (mock ID)
            KWMENG: ${{random_number(min=1, max=100)}} # Quantity
            NETPR: ${{random_number(min=10, max=500)}} # Price

      
        # --- 4. ACCOUNTING DOCUMENT HEADER (BKPF) ---
        - object: BKPF
          nickname: AccountingDoc
          count: 1                   # One accounting header per sales order
          fields:
            BELNR: ${{unique_id}}    # Accounting Document Number
            BUKRS: "1000"            # Company Code
            GJAHR: "2024"            # Fiscal Year
            BLART: "RV"              # Billing Document Type
            BLDAT: ${{SalesOrder.ERDAT}} # Document Date
            MONAT: ${{random_number(min=1, max=12)}} # Fiscal Period
            USNAM: ${{fake.UserName}} # User Name

          # --- 5. ACCOUNTING DOCUMENT SEGMENT (BSEG) ---
          friends:
            - object: BSEG
              count: 2                   # Typically a Debit and a Credit entry
              fields:
                BELNR: ${{AccountingDoc.BELNR}} # Link to BKPF
                BUKRS: "1000"
                GJAHR: "2024"
                BUZEI: ${{unique_id}}    # Line Item Number
                BSCHL: ${{random_choice("01", "50")}} # Posting Key (Customer Dr / G/L Cr)
                KOART: ${{random_choice("D", "S")}}   # Account Type (Customer / G/L)
                WRBTR: ${{SalesOrder.NETWR}} # Amount in Document Currency