# sap_enterprise.recipe.yml
snowfakery_version: 3

# --- 1. PRODUCT MASTER (MARA/MAKT) ---
- object: MARA
  count: 100
  fields:
    [cite_start]MATNR: ${{unique_id}}            # Material Number [cite: 257, 268]
    [cite_start]MTART: ${{random_choice("FERT", "HALB", "ROH")}} # Material Type 
    MBRSH: "M"                       # Industry Sector
    MEINS: "PC"                      # Base Unit of Measure
    [cite_start]MAKTX: ${{fake.Word}} Product Group # Material Description [cite: 632, 643]

# --- 2. CUSTOMER MASTER (KNA1) ---
- object: KNA1
  count: 5000 
  fields:
    [cite_start]KUNNR: ${{unique_id}}            # Customer Number [cite: 257]
    [cite_start]NAME1: ${{fake.Company}}         # Name 1 [cite: 471, 477]
    [cite_start]ORT01: ${{fake.City}}            # City [cite: 417, 424]
    [cite_start]PSTLZ: ${{fake.Postalcode}}      # Postal Code [cite: 394, 401]
    [cite_start]LAND1: ${{fake.CountryCode}}     # Country Key [cite: 848, 857]
    [cite_start]TELF1: ${{fake.PhoneNumber}}     # First telephone number [cite: 718, 726]
    [cite_start]ERDAT: ${{date_between(start_date='-5y', end_date='today')}} # Created On [cite: 307, 318]

# --- 3. SALES ORDER HEADER (VBAK) ---
  friends:
    - object: VBAK
      [cite_start]count: ${{random_number(min=1, max=10)}} # Orders per customer [cite: 154, 295]
      fields:
        [cite_start]VBELN: ${{unique_id}}        # Sales Document [cite: 257]
        [cite_start]ERDAT: ${{date_between(start_date='-1y', end_date='today')}} # Created Date [cite: 308, 313]
        [cite_start]AUART: ${{random_choice("OR", "RE", "QT")}} # Sales Document Type [cite: 285, 290]
        [cite_start]NETWR: ${{random_number(min=100, max=5000)}} # Net Value [cite: 296, 306]
        [cite_start]WAERK: "USD"                 # SD Document Currency [cite: 2043, 2044]
        VKORG: "1000"                # Sales Organization

# --- 4. SALES ORDER ITEMS (VBAP) ---
      friends:
        - object: VBAP
          [cite_start]count: ${{random_number(min=1, max=5)}} # Line items [cite: 55, 61, 298]
          fields:
            [cite_start]POSNR: ${{unique_id}}    # Sales Document Item [cite: 257]
            [cite_start]MATNR: ${{random_number(min=1, max=100)}} # Links to MARA [cite: 154]
            [cite_start]KWMENG: ${{random_number(min=1, max=100)}} # Order Quantity [cite: 295, 298]
            [cite_start]NETPR: ${{random_number(min=10, max=500)}} # Net Price [cite: 296]